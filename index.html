<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celengan By Kilaa - Tabungan Pintar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #f3f4f6; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .progress-bar-fill { transition: width 0.8s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <nav class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-extrabold tracking-tight italic">CELENGANKU</h1>
            <button onclick="toggleModal()" class="bg-white text-blue-600 font-bold px-4 py-2 rounded-full text-sm shadow-md hover:bg-gray-100 transition">
                <i class="fa-solid fa-plus"></i> Tambah Target
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div id="empty-state" class="hidden text-center py-20">
            <img src="https://illustrations.popsy.co/blue/saving-money.svg" class="w-48 mx-auto mb-4 opacity-50">
            <p class="text-gray-400 font-medium text-lg">Belum ada target tabungan.<br>Ayo mulai menabung sekarang!</p>
        </div>

        <div id="wishlist-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center p-4 z-[100]">
        <div class="glass-card w-full max-w-md rounded-[32px] overflow-hidden shadow-2xl">
            <div class="bg-blue-600 p-6 text-white flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-bold">Target Baru</h2>
                    <p class="text-blue-100 text-xs">Ayo wujudkan impianmu!</p>
                </div>
                <button onclick="toggleModal()" class="text-white opacity-70 hover:opacity-100"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="p-6 space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Nama Barang</label>
                    <input type="text" id="target-name" placeholder="Cth: Sepatu Jordan" class="w-full bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl p-3 outline-none transition-all font-semibold">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Harga (Rp)</label>
                        <input type="number" id="target-price" placeholder="Cth: 2000000" class="w-full bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl p-3 outline-none transition-all font-semibold">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Nabung/Hari</label>
                        <input type="number" id="target-daily" placeholder="Cth: 20000" class="w-full bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl p-3 outline-none transition-all font-semibold">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Link Foto Barang (URL)</label>
                    <input type="text" id="target-img" placeholder="https://link-gambar.com/foto.jpg" class="w-full bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl p-3 outline-none transition-all font-semibold">
                </div>
                
                <button onclick="saveTarget()" class="w-full mt-4 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">Simpan Target</button>
            </div>
        </div>
    </div>

    <script>
        let savings = JSON.parse(localStorage.getItem('kilaa_celengan')) || [];

        function toggleModal() {
            document.getElementById('modal').classList.toggle('hidden');
        }

        function saveTarget() {
            const name = document.getElementById('target-name').value;
            const price = parseInt(document.getElementById('target-price').value);
            const daily = parseInt(document.getElementById('target-daily').value);
            const img = document.getElementById('target-img').value || 'https://images.unsplash.com/photo-1554034483-04fda0d3507b?w=500&auto=format&fit=crop';

            if (name && price && daily) {
                const newTarget = {
                    id: Date.now(),
                    name,
                    price,
                    daily,
                    img,
                    current: 0,
                    dateStarted: new Date().toLocaleDateString('id-ID')
                };

                savings.push(newTarget);
                updateData();
                toggleModal();
                clearForm();
            } else {
                alert("Mohon isi minimal nama, harga, dan nabung harian!");
            }
        }

        function updateData() {
            localStorage.setItem('kilaa_celengan', JSON.stringify(savings));
            render();
        }

        function clearForm() {
            document.getElementById('target-name').value = '';
            document.getElementById('target-price').value = '';
            document.getElementById('target-daily').value = '';
            document.getElementById('target-img').value = '';
        }

        function adjustMoney(id, type) {
            const amount = prompt(type === 'add' ? "Berapa uang yang masuk?" : "Berapa uang yang ditarik?");
            if (amount && !isNaN(amount)) {
                const target = savings.find(s => s.id === id);
                if (type === 'add') {
                    target.current += parseInt(amount);
                } else {
                    if (target.current < amount) {
                        alert("Saldo tabungan ini tidak cukup untuk ditarik!");
                        return;
                    }
                    target.current -= parseInt(amount);
                }
                updateData();
            }
        }

        function deleteTarget(id) {
            if(confirm("Hapus target ini secara permanen?")) {
                savings = savings.filter(s => s.id !== id);
                updateData();
            }
        }

        function render() {
            const grid = document.getElementById('wishlist-grid');
            const empty = document.getElementById('empty-state');
            
            if (savings.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.innerHTML = '';

            savings.forEach(item => {
                const progress = Math.min((item.current / item.price) * 100, 100).toFixed(0);
                const remaining = item.        let savings = JSON.parse(localStorage.getItem('kilaa_celengan')) || [];

        function toggleModal() {
            const modal = document.getElementById('modal');
            modal.classList.toggle('hidden');
        }

        function saveTarget() {
            const name = document.getElementById('target-name').value;
            const price = parseInt(document.getElementById('target-price').value);
            const daily = parseInt(document.getElementById('target-daily').value);

            if (name && price && daily) {
                const newTarget = {
                    id: Date.now(),
                    name,
                    price,
                    daily,
                    current: 0,
                    dateStarted: new Date().toLocaleDateString('id-ID')
                };

                savings.push(newTarget);
                updateData();
                toggleModal();
                clearForm();
            } else {
                alert("Mohon isi semua data!");
            }
        }

        function updateData() {
            localStorage.setItem('kilaa_celengan', JSON.stringify(savings));
            render();
        }

        function clearForm() {
            document.getElementById('target-name').value = '';
            document.getElementById('target-price').value = '';
            document.getElementById('target-daily').value = '';
        }

        function addMoney(id) {
            const amount = prompt("Masukkan jumlah uang yang ditabung hari ini:");
            if (amount && !isNaN(amount)) {
                const target = savings.find(s => s.id === id);
                target.current += parseInt(amount);
                updateData();
            }
        }

        function deleteTarget(id) {
            if(confirm("Hapus target tabungan ini?")) {
                savings = savings.filter(s => s.id !== id);
                updateData();
            }
        }

        function render() {
            const grid = document.getElementById('wishlist-grid');
            const empty = document.getElementById('empty-state');
            
            if (savings.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.innerHTML = '';

            savings.forEach(item => {
                const progress = Math.min((item.current / item.price) * 100, 100).toFixed(0);
                const remaining = item.price - item.current;
                const daysLeft = Math.ceil(remaining / item.daily);
                const isFinished = item.current >= item.price;

                grid.innerHTML += `
                    <div class="bg-white rounded-[32px] p-6 shadow-sm border border-gray-100 relative overflow-hidden group">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-extrabold text-gray-800 leading-tight">${item.name}</h3>
                                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Mulai: ${item.dateStarted}</p>
                            </div>
                            <button onclick="deleteTarget(${item.id})" class="text-gray-300 hover:text-red-500 transition">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>

                        <div class="mb-6">
                            <div class="flex justify-between text-xs font-bold mb-2">
                                <span class="text-blue-600">Rp ${item.current.toLocaleString('id-ID')}</span>
                                <span class="text-gray-300">Rp ${item.price.toLocaleString('id-ID')}</span>
                            </div>
                            <div class="w-full bg-gray-100 rounded-full h-4 overflow-hidden">
                                <div class="bg-blue-500 h-full progress-bar-fill rounded-full" style="width: ${progress}%"></div>
                            </div>
                            <p class="text-right text-[10px] font-black text-blue-600 mt-2">${progress}% TERCAPAI</p>
                        </div>

                        <div class="bg-blue-50 rounded-2xl p-4 flex justify-between items-center">
                            <div>
                                <p class="text-[10px] font-bold text-blue-400 uppercase tracking-tighter italic">Sisa Hari Lagi</p>
                                <p class="text-2xl font-black text-blue-900">${isFinished ? 'SELESAI' : daysLeft + ' Hari'}</p>
                            </div>
                            <button onclick="addMoney(${item.id})" class="bg-blue-600 text-white w-12 h-12 rounded-xl shadow-lg shadow-blue-200 hover:scale-110 active:scale-95 transition-all">
                                <i class="fa-solid fa-plus text-lg"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        render();
    </script>
</body>
            </html>
